<!DOCTYPE html>
<html>
<head>
    <title>Transaction History</title>

    <style>

        body{
            font-family:Arial;
            background:#f4f6f9;
            padding:40px;
        }

        h1{
            text-align:center;
            color:#0d47a1;
        }

        table{
            width:80%;
            margin:auto;
            border-collapse:collapse;
            background:white;
            box-shadow:0px 4px 10px rgba(0,0,0,0.2);
        }

        th, td{
            padding:15px;
            border:1px solid #ccc;
            text-align:center;
        }

        th{
            background:#1565c0;
            color:white;
        }

    </style>

</head>

<body>

    <h1>Transaction History</h1>

    <table>

        <tr>
            <th>ID</th>
            <th>Username</th>
            <th>Amount</th>
        </tr>

        {% for row in data %}

        <tr>
            <td>{{ row[0] }}</td>
            <td>{{ row[1] }}</td>
            <td>{{ row[2] }}</td>
        </tr>

        {% endfor %}

    </table>

</body>
</html>

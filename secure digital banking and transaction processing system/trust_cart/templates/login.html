<!DOCTYPE html>
<html>
<head>

    <title>Login</title>

    <style>

        body{
            font-family:Arial;
            background:#f4f6f9;
        }

        .login-box{
            width:350px;
            margin:100px auto;
            background:white;
            padding:30px;
            border-radius:15px;
            box-shadow:0px 4px 10px rgba(0,0,0,0.2);
        }

        h2{
            text-align:center;
            color:#0d47a1;
        }

        input{
            width:100%;
            padding:12px;
            margin-top:15px;
            border-radius:8px;
            border:1px solid gray;
        }

        button{
            width:100%;
            padding:12px;
            margin-top:20px;
            background:#1565c0;
            color:white;
            border:none;
            border-radius:8px;
            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            background:#0d47a1;
        }

        .error{
            color:red;
            text-align:center;
        }

    </style>

</head>

<body>

    <div class="login-box">

        <h2>Secure Login</h2>

        <form method="POST">

            <input type="text" name="username" placeholder="Enter Username" required>

            <input type="password" name="password" placeholder="Enter Password" required>

            <button type="submit">Login</button>

        </form>

        {% if error %}
            <p class="error">{{ error }}</p>
        {% endif %}

    </div>

</body>
</html>
